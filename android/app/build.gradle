
plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Targeted fix for Isar AAPT lStar error (force SDK 34 for specific faulty plugin)
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            // Force SDK 34 for all flutter plugins to prevent AAPT missing lStar attributes
            project.android {
                if (namespace == null) {
                    namespace project.group
                }
                compileSdkVersion 35
            }
            
            // Specifically override dependencies just in case
            project.configurations.all {
                resolutionStrategy.eachDependency { details ->
                    if (details.requested.group == 'androidx.core' && details.requested.name.startsWith('core')) {
                        details.useVersion "1.10.1"
                    }
                }
            }
        }
    }
}

// Normal Flutter gradle block

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localProperties.load(new FileInputStream(localPropertiesFile))
}

def mapsApiKey = localProperties.getProperty("MAPS_API_KEY") ?: ""
android {
    namespace = "com.gloify.tracker_app"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.gloify.tracker_app"
        minSdk = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // ✅ ADD THIS LINE
        manifestPlaceholders = [
                MAPS_API_KEY: mapsApiKey
        ]
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
